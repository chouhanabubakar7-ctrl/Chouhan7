<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Cricket</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="live">🔴 LIVE MATCH</div>

<div class="scoreboard">

<div class="team">
<input id="team1" value="INDIA">
<h1 id="score">0-0</h1>
<p id="over">0.0</p>
</div>

<div class="info">
CRR: <span id="crr">0</span><br>
RRR: <span id="rrr">0</span><br>
Target: <input id="target" value="50">
</div>

</div>

<div class="player">
Batsman: <input id="bat" value="Player 1"><br>
Bowler: <input id="bowl" value="Player A">
</div>

<div class="controls">
<button onclick="run(1)">1</button>
<button onclick="run(2)">2</button>
<button onclick="run(4)">4</button>
<button onclick="run(6)">6</button>
<button onclick="wicket()">W</button>
<button onclick="ball()">Ball</button>
<button onclick="reset()">Reset</button>
</div>

<script src="script.js"></script>
</body>
</html>
