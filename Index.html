<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Cricket Score</title>

<style>
body {
    background:black;
    color:white;
    text-align:center;
    font-family:Arial;
}
button{
    padding:15px;
    margin:5px;
    font-size:20px;
}
</style>
</head>

<body>

<h2>IND vs AUS</h2>

<h1 id="score">0/0</h1>

<h2>Overs: <span id="overs">0.0</span></h2>

<button onclick="addRun(1)">+1</button>
<button onclick="addRun(4)">+4</button>
<button onclick="addRun(6)">+6</button>
<button onclick="wicket()">Wicket</button>

<script>

let runs=0;
let wkts=0;
let balls=0;

function addRun(r){
runs+=r;
balls++;
update();
}

function wicket(){
wkts++;
balls++;
update();
}

function update(){
document.getElementById("score").innerText=runs+"/"+wkts;
document.getElementById("overs").innerText=
Math.floor(balls/6)+"."+(balls%6);
}

</script>

</body>
</html>
